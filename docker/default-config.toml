# ──────────────────────────────────────────────────────────────────────────
# fscache — default config for Docker sidecar deployment
#
# This file is baked into the Docker image. For vanilla installs, you do
# NOT need to edit or mount this file — the compose snippet handles
# everything via volume mappings.
#
# To customize cache behavior (size, preset, eviction, etc.), copy this
# file, edit it, and mount it over the default:
#
#   volumes:
#     - ./my-config.toml:/etc/fscache/config.toml:ro
# ──────────────────────────────────────────────────────────────────────────

[paths]
# These are CONTAINER-SIDE paths — they match the right side of the
# volume mappings in docker-compose.yml. Do not change them unless you
# also change the corresponding volume mounts.
target_directories = ["/media"]
cache_directory    = "/cache"
instance_name      = "fscache"

[preset]
name = "plex-episode-prediction"

[plex]
lookahead = 4
mode = "miss-only"
process_blocklist = ["Plex Media Scanner", "Plex EAE Service", "Plex Media Fingerprinter"]

[prefetch]
mode = "cache-hit-only"
max_depth = 3
process_blocklist = []
file_whitelist = []
file_blacklist = []

[eviction]
max_size_gb = 200.0
expiry_hours = 72
min_free_space_gb = 10.0

[cache]
passthrough_mode = false
max_cache_pull_per_mount_gb = 0.0
deferred_ttl_minutes = 1440
min_access_secs = 0
min_file_size_mb = 0

[schedule]
cache_window_start = "08:00"
cache_window_end = "02:00"

[logging]
log_directory = "/var/log/fscache"
console_level = "info"
file_level = "debug"
repeat_log_window_secs = 300
